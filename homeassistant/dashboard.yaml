# Lovelace dashboard-kort för Ubuntu Maintenance
# Klistra in i din dashboard via "Edit Dashboard" → "Edit YAML"
# OBS: Kräver att templates.yaml är inkluderad i configuration.yaml

type: vertical-stack
cards:
  - type: grid
    title: Ubuntu System
    columns: 3
    square: false
    cards:
      - type: tile
        entity: sensor.ubuntu_ram
        name: RAM
      - type: tile
        entity: sensor.ubuntu_disk
        name: Disk
      - type: tile
        entity: sensor.ubuntu_uppdateringar
        name: Uppdateringar

  - type: grid
    title: Tjänster
    columns: 2
    square: false
    cards:
      - type: tile
        entity: binary_sensor.maintenance_agent
        name: Maintenance Agent
      - type: tile
        entity: binary_sensor.openclaw_gateway
        name: OpenClaw Gateway
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.ubuntu_data_stale
            state: "on"
        card:
          type: tile
          entity: sensor.ubuntu_senast_sedd
          name: Senast sedd
          color: red

  - type: grid
    title: Åtgärder
    columns: 2
    square: false
    cards:
      - type: tile
        entity: button.restart_openclaw
        name: Starta om OpenClaw
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.restart_openclaw
          confirmation:
            text: Starta om OpenClaw Gateway?
      - type: tile
        entity: button.ubuntu_reboot
        name: Reboot Ubuntu
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.ubuntu_reboot
          confirmation:
            text: Starta om Ubuntu?

  - type: markdown
    content: |
      **Senaste logg:**
      {{ states('sensor.ubuntu_maintenance_log') }}
